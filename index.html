<!DOCTYPE html>
<html>
<head>
  <title>QA Andon Dashboard</title>
  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
    }

    iframe {
      width: 100vw;
      height: 100vh;
      border: none;
    }
  </style>
</head>

<body>
  <iframe id="viewer"></iframe>

  <script>
    let slide = 2; // start at slide 2
    const totalSlides = 15; // adjust if needed

    function loadSlide() {
      document.getElementById("viewer").src =
        `dashboard.pdf#page=${slide}&zoom=page-fit`;
    }

    function nextSlide() {
      slide++;
      if (slide > totalSlides) {
        slide = 2;
      }
      loadSlide();
    }

    loadSlide();
    setInterval(nextSlide, 5000);
  </script>
</body>
</html>
